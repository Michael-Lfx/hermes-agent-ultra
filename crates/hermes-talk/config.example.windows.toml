# ============================================================
# hermes-talk Windows x86 配置示例（`hermes talk init` 会复制到 %HERMES_HOME%\hermes-talk\）
# 默认本地 sherpa-onnx；可改为 backend = "bailian" 使用云端 ASR/TTS（任意平台均支持）
# ============================================================

# ============================================================
# 语音识别 (ASR)
# ============================================================
# backend 可选: bailian | cloud | dashscope | sherpa | local
[asr]
backend = "sherpa"
sample_rate = 16000

# 云端 ASR 示例（取消注释并设置 backend = "bailian"）:
# backend = "bailian"
# model = "fun-asr-realtime"

[asr.sherpa]
model = "models/sensevoice/model.int8.onnx"
tokens = "models/sensevoice/tokens.txt"
language = "auto"
use_itn = true
num_threads = 2
provider = "cpu"

# ============================================================
# 语音合成 (TTS)
# ============================================================
[tts]
backend = "sherpa"
sample_rate = 24000

# 云端 TTS 示例:
# backend = "bailian"
# model = "cosyvoice-v3-flash"
# voice = "longanyang"

[tts.sherpa]
model = "models/kokoro/model.onnx"
voices = "models/kokoro/voices.bin"
tokens = "models/kokoro/tokens.txt"
data_dir = "models/kokoro/espeak-ng-data"
dict_dir = "models/kokoro/dict"
lexicon = "models/kokoro/lexicon-us-en.txt,models/kokoro/lexicon-zh.txt"
length_scale = 1.0
sid = 0
speed = 1.0
num_threads = 2
provider = "cpu"

# ============================================================
# 云端 DashScope（backend = bailian/cloud/dashscope 时必填）
# ============================================================
[dashscope]
api_key = "sk-your-dashscope-key"
# ws_url = "wss://dashscope.aliyuncs.com/api-ws/v1/inference"

# ============================================================
# 大语言模型 (LLM)
# ============================================================
[llm]
base_url = "http://127.0.0.1:11080/v1"
api_key = "sk-your-key"
model = "your-model"
system_prompt = "语音助手，先短答。"

[llm.aipc_talk]
transport = "channel"
session_key = "talk-hermes"

# ============================================================
# 唤醒词
# ============================================================
[wake]
enabled = true
phrases = ["小白小白"]
