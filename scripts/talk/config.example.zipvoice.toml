# ZipVoice TTS overlay for hermes-talk desktop config.
# Copy [tts] / [tts.sherpa] into config.toml, or start from config.example.desktop.toml
# and replace the [tts.sherpa] block below.
#
# Docs: https://k2-fsa.github.io/sherpa/onnx/tts/zipvoice.html
# Models: make download-talk-models (installs models/zipvoice/ + vocos_24khz.onnx)
#
# reference_text MUST exactly match what is spoken in reference_audio.

[tts]
backend = "sherpa"
sample_rate = 24000
format = "pcm"

[tts.sherpa]
kind = "zipvoice"
encoder = "models/zipvoice/encoder.int8.onnx"
decoder = "models/zipvoice/decoder.int8.onnx"
vocoder = "models/zipvoice/vocos_24khz.onnx"
tokens = "models/zipvoice/tokens.txt"
data_dir = "models/zipvoice/espeak-ng-data"
lexicon = "models/zipvoice/lexicon.txt"
reference_audio = "models/zipvoice/test_wavs/leijun-1.wav"
reference_text = "那还是三十六年前, 一九八七年. 我呢考上了武汉大学的计算机系."
num_steps = 4
speed = 1.0
num_threads = 2
provider = "cpu"
